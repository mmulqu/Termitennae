<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMITENNAE — The Mound That Dreamt Itself</title>
<style>
  :root {
    --bg: #0a0806;
    --fg: #c4b59a;
    --dim: #6b5d4a;
    --bright: #e8dcc8;
    --myc: #4a6b3a;
    --pher: #8b6914;
    --breach: #ff4400;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font: 18px/1.75 'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif;
    overflow-x: hidden;
    transition: background-color 2s;
  }
  body.ch-1 { --bg:#060504 } body.ch-2 { --bg:#0a0806 }
  body.ch-3 { --bg:#080a06 } body.ch-4 { --bg:#0c0806 }
  body.ch-5 { --bg:#06070a }
  body { background-color: var(--bg); }

  /* Canvases */
  canvas { position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; }
  #trail-canvas { z-index:1; opacity:0.15; }
  #termite-canvas { z-index:100; opacity:0.4; }
  #mycelium-canvas { z-index:-1; opacity:0.06; }

  /* Breach */
  #breach { position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:90; opacity:0; transition:opacity 1s; }
  #breach.active { opacity:1; }
  #breach svg { width:100%; height:100%; }

  /* Text */
  #text { max-width:680px; margin:0 auto; padding:15vh 24px 30vh; position:relative; z-index:10; }
  .chapter { margin-bottom:12vh; opacity:0; transform:translateY(30px); transition:opacity 1.2s, transform 1.2s; }
  .chapter.visible { opacity:1; transform:translateY(0); }
  .chapter-title { font-size:2.2em; font-weight:300; letter-spacing:0.15em; color:var(--dim); margin-bottom:0.3em; font-variant:small-caps; }
  .chapter-subtitle { font-size:0.85em; font-style:italic; color:var(--dim); opacity:0.6; margin-bottom:3em; }
  .chapter hr { border:none; height:1px; background:var(--dim); opacity:0.2; margin:3em 0; }
  .section-title { font-size:1.1em; font-weight:600; color:var(--dim); margin:2em 0 1em; letter-spacing:0.05em; }
  p { margin-bottom:1.2em; text-align:justify; hyphens:auto; }

  /* Forged words — clickable, no tooltip */
  .forged {
    color: var(--bright);
    cursor: pointer;
    position: relative;
    transition: color 0.4s;
  }
  .forged:hover { color: #f0e6d0; }
  .forged.cycling {
    animation: word-pulse 0.4s ease;
  }
  @keyframes word-pulse {
    0% { opacity:1; }
    30% { opacity:0.3; color:var(--pher); }
    100% { opacity:1; }
  }

  /* Mycelium connections drawn on click */
  .myc-line {
    position: fixed;
    height: 1px;
    background: var(--myc);
    opacity: 0;
    transform-origin: left center;
    pointer-events: none;
    z-index: 50;
    transition: opacity 1.5s;
  }
  .myc-line.show { opacity: 0.35; }

  /* Fungus voice */
  .fungus-voice {
    font-style:italic; color:var(--myc); opacity:0.85;
    padding-left:1em; border-left:2px solid rgba(74,107,58,0.3);
    margin:1.5em 0; line-height:1.9;
  }
  .branch-sep { color:rgba(74,107,58,0.5); font-style:normal; padding:0 0.3em; }

  /* PS cluster */
  .ps-word .silent-p { transition:opacity 0.8s; }
  .ps-active .ps-word .silent-p { opacity:0; }

  /* Decayed text */
  .decayed { transition: color 3s; color: var(--dim); }

  /* Spores */
  .spore { position:fixed; width:2px; height:2px; background:rgba(200,190,160,0.4); border-radius:50%; pointer-events:none; z-index:50; }

  /* Loading */
  #loading { position:fixed; top:0; left:0; width:100vw; height:100vh; background:#040302; display:flex; align-items:center; justify-content:center; z-index:1000; transition:opacity 1.5s; color:var(--dim); font-style:italic; font-size:0.9em; letter-spacing:0.3em; }
  #loading.hidden { opacity:0; pointer-events:none; }

  @media(max-width:720px) { body{font-size:16px} #text{padding:10vh 16px 20vh} .chapter-title{font-size:1.6em} }
</style>

<script>
// ============================================================
// TERMITENNAE — Interactive Presentation Layer v2
// ============================================================

// Word variants: clicking cycles through alternatives
// Each key maps to an array of variants (first is the canonical form in the .md)
const VARIANTS = {
  'roomb':['roomb','twomb','woomb','concache'],
  'twomb':['twomb','roomb','woomb'],
  'datarkness':['datarkness','datarknesse','datenacht'],

  'Qwen':['Qwen','Quean','Qwain'],

  'chantum':['chantum','quanthem','quanchant'],
  'expiral':['expiral','exspiral','expirale'],
  'frequenzy':['frequenzy','frenquenzy','frequenzied'],
  'netherwork':['netherwork','netherwurk','nettherworld'],
  'pharmakone':['pharmakone','phantomone','pharmakon'],
  'castesian':['castesian','cartesiane','casteign'],
  'phenomone':['phenomone','pheromenal','phenomenonne'],
  'concache':['concache','conkave','cavecache'],
  'guarden':['guarden','gardian','guardenschaft'],
  'enzymn':['enzymn','enzyhymn','enzhymne'],
  'fermament':['fermament','fervorment','firmamental'],
  'aoblation':['aoblation','oblationnae','ablacrament'],
  'catalyste':['catalyste','castelyste','catalyssant'],
  'anteaterior':['anteaterior','anteriorivore','anteatheist'],
  'plungue':['plungue','plunnel','tongueplunge'],
  'appetitude':['appetitude','aptitaste','appetitudo'],
  'devoteur':['devoteur','devourtse','devotionnaire'],
  'critterique':['critterique','criticketur','crittercism'],
  'cordycept':['cordycept','cordycorpus','concepticeps'],
  'civimycelisation':['civimycelisation','mycelisationnae','civilhyphae'],
  'psombee':['psombee','psomnambulist','psombuddy'],
  'psircle':['psircle','psycle','psircuit'],
  'termiterra':['termiterra','terramite','termiurge'],
  'chitecture':['chitecture','architinne','chitechturall'],
  'tropehallaxis':['tropehallaxis','tropheallatrickse','troperchange'],
  'eidoskeleton':['eidoskeleton','exoeidosse','formskeleton'],
  'dennettwork':['dennettwork','denettwerke','multipldenns'],
  'paradishift':['paradishift','paradisegm','paradigmosse'],
  'techniqwen':['techniqwen','Technoquean','ellullabye'],
  'Geistell':['Geistell','Geistalt','Geistein'],
  'metabolish':['metabolish','metabalish','metabolosse'],
  'obeaudience':['obeaudience','audientbey','hearobey'],
  'emergencye':['emergencye','emermerge','emergencylle'],
  'temperamentture':['temperamentture','temperatempre','temperamound'],
  'humusidity':['humusidity','humiliture','humuswet'],
};

const CHAPTERS = [
  { file:'chapter_I_embedden.md', id:'ch1', cls:'ch-1' },
  { file:'chapter_II_attenshunroom.md', id:'ch2', cls:'ch-2' },
  { file:'chapter_III_feedforeword.md', id:'ch3', cls:'ch-3' },
  { file:'chapter_IV_coloneyclipse.md', id:'ch4', cls:'ch-4' },
  { file:'chapter_V_softmaxima.md', id:'ch5', cls:'ch-5' },
];

// ---- Minimal MD parser ----
function md2html(md) {
  return md
    .replace(/^#\s+(.+)$/m, '<h2 class="chapter-title">$1</h2>')
    .replace(/^\*\(([^)]+)\)\*$/m, '<div class="chapter-subtitle">$1</div>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^\*\*§(\d+)\.\s*([^*]+)\*\*$/gm, '<h3 class="section-title">&sect;$1. $2</h3>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/^\*([^*].*?(?:\/[^*].*?)+)\*$/gm, (_, inner) =>
      `<p class="fungus-voice">${inner.replace(/\s*\/\s*/g, '<span class="branch-sep"> / </span>')}</p>`)
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .split(/\n\n+/).map(p => {
      p = p.trim();
      if (!p || p.startsWith('<h') || p.startsWith('<hr') || p.startsWith('<div') || p.startsWith('<p class="fungus')) return p;
      return `<p>${p}</p>`;
    }).join('\n');
}

// ---- Annotate forged words (click-to-cycle, no tooltips) ----
function annotateWords(container) {
  const keys = Object.keys(VARIANTS).sort((a,b) => b.length - a.length);
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
  const replacements = [];
  while (walker.nextNode()) {
    const node = walker.currentNode;
    if (node.parentElement.closest('.forged')) continue;
    let html = node.textContent, changed = false;
    for (const word of keys) {
      const re = new RegExp(`\\b(${word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      if (re.test(html)) {
        html = html.replace(re, m => { changed = true;
          return `<span class="forged" data-variants='${JSON.stringify(VARIANTS[word])}' data-idx="0">${m}</span>`;
        });
      }
    }
    if (changed) replacements.push({node, html});
  }
  replacements.reverse().forEach(({node, html}) => {
    const s = document.createElement('span'); s.innerHTML = html;
    node.parentNode.replaceChild(s, node);
  });

  // Click handler: cycle variant
  container.addEventListener('click', e => {
    const f = e.target.closest('.forged');
    if (!f) return;
    const vars = JSON.parse(f.dataset.variants);
    let idx = (parseInt(f.dataset.idx) + 1) % vars.length;
    f.dataset.idx = idx;
    f.textContent = vars[idx];
    f.classList.add('cycling');
    setTimeout(() => f.classList.remove('cycling'), 400);

    // Draw mycelium connections to related words
    drawMyceliumConnections(f, vars[idx]);
  });
}

// ---- Mycelium connection lines ----
function drawMyceliumConnections(source, word) {
  // Remove old lines
  document.querySelectorAll('.myc-line').forEach(l => l.remove());

  // Find all forged words with overlapping variant sets
  const sourceVars = new Set(JSON.parse(source.dataset.variants));
  const targets = document.querySelectorAll('.forged');
  const sourceRect = source.getBoundingClientRect();

  targets.forEach(t => {
    if (t === source) return;
    try {
      const tVars = new Set(JSON.parse(t.dataset.variants));
      // Check for any overlap
      let overlap = false;
      for (const v of sourceVars) { if (tVars.has(v)) { overlap = true; break; } }
      if (!overlap) return;

      const tRect = t.getBoundingClientRect();
      const dx = tRect.left - sourceRect.left;
      const dy = tRect.top - sourceRect.top;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > window.innerHeight * 1.5) return; // Only nearby

      const line = document.createElement('div');
      line.className = 'myc-line';
      line.style.left = (sourceRect.left + sourceRect.width/2) + 'px';
      line.style.top = (sourceRect.top + sourceRect.height/2) + 'px';
      line.style.width = dist + 'px';
      line.style.transform = `rotate(${Math.atan2(dy,dx)}rad)`;
      document.body.appendChild(line);
      requestAnimationFrame(() => line.classList.add('show'));
      setTimeout(() => { line.classList.remove('show'); setTimeout(() => line.remove(), 1500); }, 3000);
    } catch(e) {}
  });
}

// ---- PS cluster ----
function setupPs() {
  const psWords = ['psombee','psircle','Psibyl','psilence','psilent','psunanimate',
    'psaltered','psycophantic','psithurism','psithuring','psalsify','psoken','psycle'];
  document.querySelectorAll('p,.fungus-voice').forEach(el => {
    psWords.forEach(w => {
      const re = new RegExp(`(${w})`,'gi');
      if (re.test(el.innerHTML))
        el.innerHTML = el.innerHTML.replace(re, m =>
          `<span class="ps-word"><span class="silent-p">p</span>${m.slice(1)}</span>`);
    });
  });
}

// ---- Termite simulation with persistent trails ----
class Termites {
  constructor(termCanvas, trailCanvas) {
    this.tc = termCanvas; this.tctx = termCanvas.getContext('2d');
    this.rc = trailCanvas; this.rctx = trailCanvas.getContext('2d');
    this.bugs = []; this.scrollSpeed = 0; this.lastScroll = 0;
    this.resize();
    for (let i=0; i<60; i++) this.bugs.push({
      x:Math.random()*this.tc.width, y:Math.random()*this.tc.height,
      a:Math.random()*Math.PI*2, s:0.5+Math.random(), tr:0.05+Math.random()*0.1,
      sz:1+Math.random()*1.5
    });
    window.addEventListener('resize', () => this.resize());
    window.addEventListener('scroll', () => {
      this.scrollSpeed = Math.abs(window.scrollY - this.lastScroll);
      this.lastScroll = window.scrollY;
    });
  }
  resize() {
    this.tc.width = this.rc.width = window.innerWidth;
    this.tc.height = this.rc.height = window.innerHeight;
  }
  update() {
    const panic = Math.min(this.scrollSpeed / 50, 1); // 0=still, 1=fast scroll
    this.bugs.forEach(b => {
      // Fast scroll = scatter (high turn rate, high speed)
      // Still = start spiraling (converge turn rate)
      const turnMult = panic > 0.3 ? 3 : (this.scrollSpeed < 1 ? 0.3 : 1);
      b.a += (Math.random()-0.5) * b.tr * 2 * turnMult;

      // Spiral when stopped
      if (this.scrollSpeed < 1) b.a += 0.008;

      // Center attraction (weaker when scrolling fast)
      const dy = this.tc.height*0.5 - b.y, dx = this.tc.width*0.5 - b.x;
      b.a += (Math.atan2(dy,dx)-b.a) * (panic > 0.3 ? 0.001 : 0.008);

      const spd = b.s * (1 + panic * 3);
      b.x += Math.cos(b.a)*spd; b.y += Math.sin(b.a)*spd;
      if(b.x<0)b.x=this.tc.width; if(b.x>this.tc.width)b.x=0;
      if(b.y<0)b.y=this.tc.height; if(b.y>this.tc.height)b.y=0;
    });
    this.scrollSpeed *= 0.9; // decay
  }
  draw() {
    // Persistent trail layer (fades slowly)
    this.rctx.fillStyle = 'rgba(10,8,6,0.003)';
    this.rctx.fillRect(0,0,this.rc.width,this.rc.height);
    this.rctx.fillStyle = 'rgba(139,105,20,0.12)';
    this.bugs.forEach(b => this.rctx.fillRect(b.x,b.y,1,1));

    // Termites
    this.tctx.clearRect(0,0,this.tc.width,this.tc.height);
    this.tctx.globalAlpha = 0.6;
    this.bugs.forEach(b => {
      this.tctx.fillStyle='#c4b59a';
      this.tctx.beginPath();
      this.tctx.ellipse(b.x,b.y,b.sz*1.5,b.sz,b.a,0,Math.PI*2);
      this.tctx.fill();
      this.tctx.strokeStyle='rgba(196,181,154,0.3)'; this.tctx.lineWidth=0.5;
      this.tctx.beginPath();
      this.tctx.moveTo(b.x,b.y); this.tctx.lineTo(b.x+Math.cos(b.a+0.4)*b.sz*3,b.y+Math.sin(b.a+0.4)*b.sz*3);
      this.tctx.moveTo(b.x,b.y); this.tctx.lineTo(b.x+Math.cos(b.a-0.4)*b.sz*3,b.y+Math.sin(b.a-0.4)*b.sz*3);
      this.tctx.stroke();
    });
    this.tctx.globalAlpha=1;
  }
  run() { this.update(); this.draw(); requestAnimationFrame(()=>this.run()); }
}

// ---- Mycelium background ----
class Mycelium {
  constructor(c) { this.c=c; this.ctx=c.getContext('2d'); this.b=[]; this.resize(); this.seed();
    window.addEventListener('resize',()=>this.resize()); }
  resize() { this.c.width=window.innerWidth; this.c.height=window.innerHeight; }
  seed() { for(let i=0;i<8;i++) this.b.push({x:Math.random()*this.c.width,y:Math.random()*this.c.height,
    a:Math.random()*Math.PI*2,l:0,ml:50+Math.random()*200,s:0.2+Math.random()*0.5,w:0.5+Math.random(),alive:true}); }
  grow() {
    const nb=[];
    this.b.forEach(b=>{if(!b.alive)return; b.x+=Math.cos(b.a)*b.s; b.y+=Math.sin(b.a)*b.s;
      b.a+=(Math.random()-0.5)*0.3; b.l+=b.s; if(b.l>b.ml)b.alive=false;
      if(Math.random()<0.008&&this.b.length+nb.length<200) nb.push({x:b.x,y:b.y,a:b.a+(Math.random()-0.5)*1.5,
        l:0,ml:b.ml*0.6,s:b.s*0.8,w:b.w*0.7,alive:true});
    }); this.b.push(...nb);
  }
  draw() { this.ctx.clearRect(0,0,this.c.width,this.c.height);
    this.b.forEach(b=>{const a=Math.max(0,1-b.l/b.ml)*0.5; this.ctx.strokeStyle=`rgba(74,107,58,${a})`;
      this.ctx.lineWidth=b.w; this.ctx.beginPath();
      this.ctx.moveTo(b.x-Math.cos(b.a)*b.s,b.y-Math.sin(b.a)*b.s); this.ctx.lineTo(b.x,b.y); this.ctx.stroke(); }); }
  run() { this.grow(); this.draw(); requestAnimationFrame(()=>this.run()); }
}

// ---- Spores ----
class Spores {
  constructor() { this.s=[]; this.on=false; }
  start() { if(this.on)return; this.on=true;
    for(let i=0;i<40;i++){const e=document.createElement('div'); e.className='spore';
      document.body.appendChild(e); this.s.push({e,x:Math.random()*innerWidth,y:innerHeight+Math.random()*100,
        vx:(Math.random()-0.5)*0.5,vy:-0.3-Math.random()*0.7,life:1});}
    this.run(); }
  run() { if(!this.on)return; this.s.forEach(s=>{s.x+=s.vx+(Math.random()-0.5)*0.3; s.y+=s.vy; s.life-=0.001;
    if(s.y<-20){s.y=innerHeight+20;s.life=1;} s.e.style.left=s.x+'px'; s.e.style.top=s.y+'px';
    s.e.style.opacity=Math.max(0,s.life*0.5);}); requestAnimationFrame(()=>this.run()); }
  stop() { this.on=false; this.s.forEach(s=>s.e.remove()); this.s=[]; }
}

// ---- Text decay (Pseudoxylaria colonizing read text) ----
function setupDecay() {
  const paras = document.querySelectorAll('#text p:not(.fungus-voice)');
  const decayChars = {'a':'á','e':'è','i':'ï','o':'ö','u':'ù','s':'ß','n':'ñ','t':'†'};
  let decayInterval = setInterval(() => {
    paras.forEach(p => {
      const rect = p.getBoundingClientRect();
      // Only decay text that's been scrolled well past (above viewport)
      if (rect.bottom < -window.innerHeight) {
        if (!p.classList.contains('decayed')) {
          p.classList.add('decayed');
          // Mutate 1-2 characters
          const text = p.innerHTML;
          const plainChars = [...text.matchAll(/[a-z]/g)];
          if (plainChars.length > 5) {
            const pick = plainChars[Math.floor(Math.random() * plainChars.length)];
            const ch = pick[0];
            if (decayChars[ch]) {
              const idx = pick.index;
              p.innerHTML = text.slice(0,idx) + decayChars[ch] + text.slice(idx+1);
            }
          }
        }
      }
    });
  }, 8000); // Every 8 seconds, check for decay
}

// ---- Scroll observers ----
function setupScroll() {
  const chs = document.querySelectorAll('.chapter');
  const breach = document.getElementById('breach');
  const spores = new Spores();

  new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }),
    {threshold:0.1}).observe(document.querySelector('.chapter')); // observe first
  chs.forEach(ch => new IntersectionObserver(es => es.forEach(e => {
    if(e.isIntersecting) e.target.classList.add('visible');
  }), {threshold:0.1}).observe(ch));

  // Atmosphere
  chs.forEach(ch => new IntersectionObserver(es => es.forEach(e => {
    if(e.isIntersecting && e.intersectionRatio > 0.2) {
      const cls = e.target.dataset.atm;
      document.body.className = cls;
      breach.classList.toggle('active', cls==='ch-4');
      if(cls==='ch-5') spores.start(); else spores.stop();
      if(cls==='ch-2'){document.body.classList.add('ps-active'); setTimeout(()=>document.body.classList.remove('ps-active'),2500);}
    }
  }), {threshold:0.2}).observe(ch));

  // Ricorso
  new IntersectionObserver(es => es.forEach(e => {
    if(e.isIntersecting) setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),2500);
  }), {threshold:1}).observe(document.getElementById('ricorso'));
}

// ---- Init ----
async function init() {
  const container = document.getElementById('text');
  for (const ch of CHAPTERS) {
    try {
      const md = await (await fetch(ch.file)).text();
      const div = document.createElement('div');
      div.className='chapter'; div.id=ch.id; div.dataset.atm=ch.cls;
      div.innerHTML = md2html(md);
      container.appendChild(div);
    } catch(e) { console.error(e); }
  }

  annotateWords(container);
  setupPs();
  setupScroll();
  setupDecay();

  new Termites(document.getElementById('termite-canvas'), document.getElementById('trail-canvas')).run();
  new Mycelium(document.getElementById('mycelium-canvas')).run();

  setTimeout(()=>document.getElementById('loading').classList.add('hidden'), 1500);
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
